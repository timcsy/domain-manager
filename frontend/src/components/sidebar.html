<aside class="w-64 bg-white shadow-lg h-screen relative">
    <div class="p-4 border-b border-gray-200">
        <h1 class="text-xl font-bold text-primary-600">域名管理器</h1>
    </div>

    <nav class="p-4 space-y-2 pb-24">
        <a href="/dashboard"
           class="flex items-center space-x-3 px-3 py-2 rounded-md"
           :class="window.location.pathname === '/dashboard' ? 'bg-primary-50 text-primary-700' : 'hover:bg-gray-100'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            <span>儀表板</span>
        </a>

        <a href="/domains"
           class="flex items-center space-x-3 px-3 py-2 rounded-md"
           :class="window.location.pathname === '/domains' ? 'bg-primary-50 text-primary-700' : 'hover:bg-gray-100'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 919-9"></path>
            </svg>
            <span>域名管理</span>
        </a>

        <a href="/certificates"
           class="flex items-center space-x-3 px-3 py-2 rounded-md"
           :class="window.location.pathname === '/certificates' ? 'bg-primary-50 text-primary-700' : 'hover:bg-gray-100'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
            </svg>
            <span>SSL 憑證</span>
        </a>

        <a href="/backup"
           class="flex items-center space-x-3 px-3 py-2 rounded-md"
           :class="window.location.pathname === '/backup' ? 'bg-primary-50 text-primary-700' : 'hover:bg-gray-100'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
            </svg>
            <span>備份管理</span>
        </a>

        <a href="/api-keys"
           class="flex items-center space-x-3 px-3 py-2 rounded-md"
           :class="window.location.pathname === '/api-keys' ? 'bg-primary-50 text-primary-700' : 'hover:bg-gray-100'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
            </svg>
            <span>API 金鑰</span>
        </a>

        <a href="/api-docs"
           class="flex items-center space-x-3 px-3 py-2 rounded-md"
           :class="window.location.pathname === '/api-docs' ? 'bg-primary-50 text-primary-700' : 'hover:bg-gray-100'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <span>API 文件</span>
        </a>

        <a href="/settings"
           class="flex items-center space-x-3 px-3 py-2 rounded-md"
           :class="window.location.pathname === '/settings' ? 'bg-primary-50 text-primary-700' : 'hover:bg-gray-100'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span>系統設定</span>
        </a>

        <div class="px-3 py-2 mt-2 border-t border-gray-100 pt-3">
            <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">整合狀態</p>
            <div id="cf-status" class="text-xs text-gray-500"
                 hx-get="/api/v1/cloudflare/status" hx-trigger="load"
                 hx-headers='{"X-Session-Token": ""}'
                 hx-swap="innerHTML">
                <span class="text-gray-400">載入中...</span>
            </div>
            <script>
                document.addEventListener('htmx:beforeRequest', function(evt) {
                    if (evt.detail.elt.id === 'cf-status') {
                        const token = localStorage.getItem('token');
                        if (token) evt.detail.xhr.setRequestHeader('X-Session-Token', token);
                    }
                });
                document.addEventListener('htmx:afterRequest', function(evt) {
                    if (evt.detail.elt.id === 'cf-status') {
                        try {
                            const data = JSON.parse(evt.detail.xhr.responseText);
                            const el = document.getElementById('cf-status');
                            if (data.success && data.data) {
                                const d = data.data;
                                const dot = d.enabled ? '<span class="inline-block w-2 h-2 rounded-full bg-green-500 mr-1"></span>' : '<span class="inline-block w-2 h-2 rounded-full bg-gray-300 mr-1"></span>';
                                el.innerHTML = dot + 'Cloudflare: ' + (d.enabled ? '已啟用' : '未啟用');
                            } else {
                                el.innerHTML = '<span class="inline-block w-2 h-2 rounded-full bg-gray-300 mr-1"></span>Cloudflare: 未啟用';
                            }
                        } catch(e) {
                            document.getElementById('cf-status').innerHTML = '';
                        }
                    }
                });
            </script>
        </div>
    </nav>

    <div class="absolute bottom-0 left-0 w-64 p-4 border-t border-gray-200 bg-white">
        <button onclick="localStorage.removeItem('token'); window.location.href='/login';"
                class="flex items-center space-x-3 px-3 py-2 rounded-md hover:bg-gray-100 w-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            <span>登出</span>
        </button>
    </div>
</aside>

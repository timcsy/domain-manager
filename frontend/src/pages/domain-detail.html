<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名詳情 - Kubernetes 域名管理器</title>
    <link href="/dist/styles/main.css" rel="stylesheet">
    <script>
        // Configure htmx BEFORE it loads
        document.addEventListener('htmx:configRequest', function(evt) {
            const token = localStorage.getItem('token');
            if (token) {
                evt.detail.headers['X-Session-Token'] = token;
            }
        });

        // Check authentication
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/alpinejs@3.13.7/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50">
    <div x-data="{
        domainId: null,
        domain: null,
        status: null,
        diagnostics: null,
        loading: true,
        error: null,
        showEditModal: false,
        namespaces: [],
        services: [],
        availablePorts: [],
        editForm: {
            target_service: '',
            target_namespace: '',
            target_port: 80,
            ssl_mode: 'auto',
            enabled: true
        },
        async init() {
            // 從 URL 取得域名 ID
            const urlParams = new URLSearchParams(window.location.search);
            this.domainId = urlParams.get('id');

            if (!this.domainId) {
                this.error = '未指定域名 ID';
                this.loading = false;
                return;
            }

            await this.loadDomain();
            await this.loadStatus();
            await this.loadDiagnostics();
        },
        async loadDomain() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/v1/domains/${this.domainId}`, {
                    headers: { 'X-Session-Token': token }
                });
                const data = await response.json();

                if (data.success) {
                    this.domain = data.data;
                    // 預填編輯表單（更新屬性而不是替換物件以保持響應性）
                    this.editForm.target_service = this.domain.target_service;
                    this.editForm.target_namespace = this.domain.target_namespace;
                    this.editForm.target_port = this.domain.target_port;
                    this.editForm.ssl_mode = this.domain.ssl_mode;
                    this.editForm.enabled = this.domain.enabled;
                } else {
                    this.error = data.message || '載入域名失敗';
                }
            } catch (err) {
                console.error('Failed to load domain:', err);
                this.error = '載入域名失敗';
            } finally {
                this.loading = false;
            }
        },
        async loadStatus() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/v1/domains/${this.domainId}/status`, {
                    headers: { 'X-Session-Token': token }
                });
                const data = await response.json();

                if (data.success) {
                    this.status = data.data;
                }
            } catch (err) {
                console.error('Failed to load status:', err);
            }
        },
        async loadDiagnostics() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/v1/domains/${this.domainId}/diagnostics`, {
                    headers: { 'X-Session-Token': token }
                });
                const data = await response.json();

                if (data.success) {
                    this.diagnostics = data.data;
                }
            } catch (err) {
                console.error('Failed to load diagnostics:', err);
            }
        },
        async updateDomain() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/v1/domains/${this.domainId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Token': token
                    },
                    body: JSON.stringify(this.editForm)
                });
                const data = await response.json();

                if (data.success) {
                    this.showEditModal = false;
                    await this.loadDomain();
                    await this.loadStatus();
                    alert('域名更新成功！');
                } else {
                    alert('域名更新失敗: ' + data.message);
                }
            } catch (err) {
                console.error('Failed to update domain:', err);
                alert('域名更新失敗');
            }
        },
        async deleteDomain() {
            if (!confirm('確定要刪除此域名嗎？此操作無法復原。')) return;

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/v1/domains/${this.domainId}?hard=true`, {
                    method: 'DELETE',
                    headers: { 'X-Session-Token': token }
                });

                if (response.ok) {
                    alert('域名已刪除');
                    window.location.href = '/domains';
                } else {
                    alert('刪除域名失敗');
                }
            } catch (err) {
                console.error('Failed to delete domain:', err);
                alert('刪除域名失敗');
            }
        },
        async refreshStatus() {
            await this.loadStatus();
            await this.loadDiagnostics();
        },
        async loadNamespaces() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/v1/services', {
                    headers: { 'X-Session-Token': token }
                });
                const data = await response.json();

                if (data.success && data.data) {
                    // Extract unique namespaces from services
                    const services = data.data.services || data.data;
                    const namespaceSet = new Set(services.map(s => s.namespace));
                    this.namespaces = Array.from(namespaceSet).sort();
                }
            } catch (err) {
                console.error('Failed to load namespaces:', err);
            }
        },
        async loadServicesForNamespace(namespace) {
            if (!namespace) {
                this.services = [];
                this.availablePorts = [];
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/v1/services?namespace=${namespace}`, {
                    headers: { 'X-Session-Token': token }
                });
                const data = await response.json();

                if (data.success && data.data) {
                    // Handle both nested {services: [...]} and flat [...] response structures
                    const services = data.data.services || data.data;
                    this.services = services.filter(s => s.namespace === namespace);
                }
            } catch (err) {
                console.error('Failed to load services:', err);
                this.services = [];
            }
        },
        async onNamespaceChange() {
            await this.loadServicesForNamespace(this.editForm.target_namespace);
            // Reset service and port selection
            this.editForm.target_service = '';
            this.editForm.target_port = 80;
            this.availablePorts = [];
        },
        onServiceChange() {
            // Find the selected service and populate available ports
            const selectedService = this.services.find(s => s.name === this.editForm.target_service);
            if (selectedService && selectedService.ports) {
                this.availablePorts = selectedService.ports;
                // Auto-select first port if available
                if (this.availablePorts.length > 0) {
                    this.editForm.target_port = this.availablePorts[0].port;
                }
            } else {
                this.availablePorts = [];
            }
        },
        async openEditModal() {
            // Load all namespaces first
            await this.loadNamespaces();

            // Ensure current namespace is in the list
            if (this.editForm.target_namespace && !this.namespaces.includes(this.editForm.target_namespace)) {
                this.namespaces.push(this.editForm.target_namespace);
            }

            // Load services for the current namespace
            if (this.editForm.target_namespace) {
                await this.loadServicesForNamespace(this.editForm.target_namespace);

                // Ensure current service is in the list (in case it's not returned by the API)
                if (this.editForm.target_service && !this.services.find(s => s.name === this.editForm.target_service)) {
                    this.services.push({
                        name: this.editForm.target_service,
                        namespace: this.editForm.target_namespace,
                        ports: []
                    });
                }

                // Set available ports for the current service
                this.onServiceChange();
            }

            // Show modal - x-if will recreate DOM with current values
            this.showEditModal = true;
        },
        getStatusBadgeClass(status) {
            const statusMap = {
                'active': 'bg-green-100 text-green-800',
                'pending': 'bg-yellow-100 text-yellow-800',
                'error': 'bg-red-100 text-red-800',
                'disabled': 'bg-gray-100 text-gray-800'
            };
            return statusMap[status] || 'bg-gray-100 text-gray-800';
        },
        getDiagnosticStatusClass(status) {
            const statusMap = {
                'healthy': 'bg-green-100 text-green-800 border-green-200',
                'warning': 'bg-yellow-100 text-yellow-800 border-yellow-200',
                'error': 'bg-red-100 text-red-800 border-red-200',
                'not_found': 'bg-red-100 text-red-800 border-red-200',
                'not_configured': 'bg-gray-100 text-gray-800 border-gray-200'
            };
            return statusMap[status] || 'bg-gray-100 text-gray-800 border-gray-200';
        },
        getHealthBadgeClass(health) {
            const healthMap = {
                'healthy': 'bg-green-100 text-green-800',
                'degraded': 'bg-yellow-100 text-yellow-800',
                'error': 'bg-red-100 text-red-800'
            };
            return healthMap[health] || 'bg-gray-100 text-gray-800';
        },
        getStatusIcon(status) {
            const iconMap = {
                'healthy': '✓',
                'warning': '⚠',
                'error': '✗',
                'not_found': '✗',
                'not_configured': '-'
            };
            return iconMap[status] || '?';
        },
        formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString('zh-TW');
        }
    }" x-init="init()" class="flex h-screen">
        <!-- Sidebar -->
        <div hx-get="/components/sidebar.html" hx-trigger="load" hx-swap="outerHTML"></div>

        <main class="flex-1 overflow-y-auto">
            <div class="container mx-auto p-6">
                <!-- Header -->
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-4">
                        <a href="/domains" class="text-blue-600 hover:text-blue-800">← 返回列表</a>
                        <h1 class="text-2xl font-bold" x-text="domain ? domain.domain_name : '載入中...'"></h1>
                    </div>
                    <div class="flex gap-2" x-show="!loading && domain">
                        <button @click="openEditModal()" class="btn-secondary">
                            編輯
                        </button>
                        <button @click="deleteDomain()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                            刪除
                        </button>
                    </div>
                </div>

                <!-- Loading State -->
                <div x-show="loading" class="card">
                    <div class="text-center py-8 text-gray-500">載入中...</div>
                </div>

                <!-- Error State -->
                <div x-show="!loading && error" class="card bg-red-50 border border-red-200">
                    <div class="text-center py-8 text-red-600" x-text="error"></div>
                </div>

                <!-- Domain Details -->
                <div x-show="!loading && !error && domain" class="space-y-6">
                    <!-- Basic Information -->
                    <div class="card">
                        <h2 class="text-xl font-semibold mb-4">基本資訊</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-sm font-medium text-gray-500">域名</label>
                                <p class="text-lg" x-text="domain?.domain_name"></p>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-gray-500">狀態</label>
                                <div>
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                          :class="getStatusBadgeClass(domain?.status)"
                                          x-text="domain?.status"></span>
                                </div>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-gray-500">啟用狀態</label>
                                <p x-text="domain?.enabled ? '啟用' : '停用'"></p>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-gray-500">SSL 模式</label>
                                <p x-text="domain?.ssl_mode"></p>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-gray-500">建立時間</label>
                                <p x-text="formatDate(domain?.created_at)"></p>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-gray-500">更新時間</label>
                                <p x-text="formatDate(domain?.updated_at)"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Target Service Information -->
                    <div class="card">
                        <h2 class="text-xl font-semibold mb-4">目標服務</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-sm font-medium text-gray-500">服務名稱</label>
                                <p class="font-mono" x-text="domain?.target_service"></p>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-gray-500">命名空間</label>
                                <p class="font-mono" x-text="domain?.target_namespace"></p>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-gray-500">埠號</label>
                                <p class="font-mono" x-text="domain?.target_port"></p>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-gray-500">完整位址</label>
                                <p class="font-mono text-sm" x-text="`${domain?.target_service}.${domain?.target_namespace}.svc.cluster.local:${domain?.target_port}`"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Diagnostics Information -->
                    <div class="card">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h2 class="text-xl font-semibold">診斷資訊</h2>
                                <p class="text-sm text-gray-500" x-show="diagnostics" x-text="'最後檢查: ' + formatDate(diagnostics?.last_checked)"></p>
                            </div>
                            <button @click="refreshStatus()" class="btn-secondary text-sm">
                                🔄 重新整理
                            </button>
                        </div>

                        <div x-show="diagnostics" class="space-y-4">
                            <!-- Overall Health -->
                            <div class="p-4 border-2 rounded-lg" :class="getHealthBadgeClass(diagnostics?.overall_health)">
                                <div class="flex items-center justify-between">
                                    <div>
                                        <label class="text-sm font-medium">整體健康狀態</label>
                                        <p class="text-2xl font-bold" x-text="diagnostics?.overall_health"></p>
                                    </div>
                                    <div class="text-4xl" x-text="getStatusIcon(diagnostics?.overall_health)"></div>
                                </div>
                            </div>

                            <!-- Ingress Diagnostics -->
                            <div class="border rounded-lg p-4" :class="getDiagnosticStatusClass(diagnostics?.ingress?.status)">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-2">
                                            <span class="text-xl" x-text="getStatusIcon(diagnostics?.ingress?.status)"></span>
                                            <h3 class="font-semibold text-lg">Ingress 狀態</h3>
                                        </div>
                                        <p class="text-sm mb-2" x-text="diagnostics?.ingress?.message"></p>
                                        <div class="text-xs space-y-1">
                                            <div x-show="diagnostics?.ingress?.configured">
                                                <span class="font-medium">配置狀態:</span>
                                                <span x-text="diagnostics?.ingress?.configured ? '已配置' : '未配置'"></span>
                                            </div>
                                            <div x-show="diagnostics?.ingress?.host">
                                                <span class="font-medium">主機:</span>
                                                <span class="font-mono" x-text="diagnostics?.ingress?.host"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Service Diagnostics -->
                            <div class="border rounded-lg p-4" :class="getDiagnosticStatusClass(diagnostics?.service?.status)">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-2">
                                            <span class="text-xl" x-text="getStatusIcon(diagnostics?.service?.status)"></span>
                                            <h3 class="font-semibold text-lg">服務狀態</h3>
                                        </div>
                                        <p class="text-sm mb-2" x-text="diagnostics?.service?.message"></p>
                                        <div class="text-xs space-y-1">
                                            <div x-show="diagnostics?.service?.namespace">
                                                <span class="font-medium">命名空間:</span>
                                                <span class="font-mono" x-text="diagnostics?.service?.namespace"></span>
                                            </div>
                                            <div x-show="diagnostics?.service?.name">
                                                <span class="font-medium">服務名稱:</span>
                                                <span class="font-mono" x-text="diagnostics?.service?.name"></span>
                                            </div>
                                            <div x-show="diagnostics?.service?.port">
                                                <span class="font-medium">埠號:</span>
                                                <span class="font-mono" x-text="diagnostics?.service?.port"></span>
                                            </div>
                                            <div>
                                                <span class="font-medium">可達性:</span>
                                                <span x-text="diagnostics?.service?.reachable ? '可達' : '不可達'"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Certificate Diagnostics -->
                            <div class="border rounded-lg p-4" :class="getDiagnosticStatusClass(diagnostics?.certificate?.status)">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-2">
                                            <span class="text-xl" x-text="getStatusIcon(diagnostics?.certificate?.status)"></span>
                                            <h3 class="font-semibold text-lg">憑證狀態</h3>
                                        </div>
                                        <p class="text-sm mb-2" x-text="diagnostics?.certificate?.message"></p>
                                        <div class="text-xs space-y-1">
                                            <div>
                                                <span class="font-medium">配置狀態:</span>
                                                <span x-text="diagnostics?.certificate?.configured ? '已配置' : '未配置'"></span>
                                            </div>
                                            <div x-show="diagnostics?.certificate?.expires_at">
                                                <span class="font-medium">到期時間:</span>
                                                <span x-text="formatDate(diagnostics?.certificate?.expires_at)"></span>
                                            </div>
                                            <div x-show="diagnostics?.certificate?.days_remaining !== undefined">
                                                <span class="font-medium">剩餘天數:</span>
                                                <span x-text="diagnostics?.certificate?.days_remaining + ' 天'"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div x-show="!diagnostics" class="text-center py-8 text-gray-500">
                            載入診斷資訊中...
                        </div>
                    </div>
                </div>

                <!-- Edit Modal -->
                <template x-if="showEditModal">
                    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                        <div @click.away="showEditModal = false" class="bg-white rounded-lg p-6 w-full max-w-md">
                        <h3 class="text-lg font-semibold mb-4">編輯域名</h3>
                        <form @submit.prevent="updateDomain()">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium mb-1">命名空間</label>
                                    <select x-model="editForm.target_namespace" @change="onNamespaceChange()" required class="input">
                                        <option value="">請選擇命名空間</option>
                                        <template x-for="ns in namespaces" :key="ns">
                                            <option :value="ns" x-text="ns" :selected="ns === editForm.target_namespace"></option>
                                        </template>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1">目標服務</label>
                                    <select x-model="editForm.target_service" @change="onServiceChange()" required class="input" :disabled="!editForm.target_namespace || services.length === 0">
                                        <option value="">請選擇服務</option>
                                        <template x-for="service in services" :key="service.name">
                                            <option :value="service.name" x-text="service.name" :selected="service.name === editForm.target_service"></option>
                                        </template>
                                    </select>
                                    <p x-show="editForm.target_namespace && services.length === 0" class="text-sm text-gray-500 mt-1">此命名空間沒有可用的服務</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1">埠號</label>
                                    <select x-show="availablePorts.length > 0" x-model.number="editForm.target_port" required class="input">
                                        <template x-for="portInfo in availablePorts" :key="portInfo.port">
                                            <option :value="portInfo.port" x-text="`${portInfo.port}${portInfo.name ? ' (' + portInfo.name + ')' : ''}`"></option>
                                        </template>
                                    </select>
                                    <input x-show="availablePorts.length === 0" type="number" x-model.number="editForm.target_port" required class="input" :disabled="!editForm.target_service">
                                    <p x-show="availablePorts.length === 0 && editForm.target_service" class="text-sm text-gray-500 mt-1">手動輸入埠號</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1">SSL 模式</label>
                                    <select x-model="editForm.ssl_mode" class="input">
                                        <option value="auto">自動</option>
                                        <option value="manual">手動</option>
                                        <option value="none">無</option>
                                    </select>
                                </div>
                                <div class="flex items-center">
                                    <input type="checkbox" x-model="editForm.enabled" id="enabled" class="mr-2">
                                    <label for="enabled" class="text-sm font-medium">啟用域名</label>
                                </div>
                            </div>
                            <div class="mt-6 flex space-x-3">
                                <button type="submit" class="btn-primary flex-1">更新</button>
                                <button type="button" @click="showEditModal = false" class="btn-secondary flex-1">取消</button>
                            </div>
                        </form>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>
</body>
</html>

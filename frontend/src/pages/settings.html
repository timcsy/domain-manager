<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統設定 - Kubernetes 域名管理器</title>
    <link href="/dist/styles/main.css" rel="stylesheet">
    <script>
        document.addEventListener('htmx:configRequest', function(evt) {
            const token = localStorage.getItem('token');
            if (token) {
                evt.detail.headers['X-Session-Token'] = token;
            }
        });

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/alpinejs@3.13.7/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div hx-get="/components/sidebar.html" hx-trigger="load" hx-swap="outerHTML"></div>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm border-b border-gray-200 p-6">
                <h2 class="text-2xl font-bold text-gray-900">系統設定</h2>
                <p class="text-gray-600 mt-1">管理 Let's Encrypt、Ingress 和憑證續約設定</p>
            </header>

            <div class="p-6" x-data="{
                settings: {},
                loading: true,
                saving: false,
                message: null,
                messageType: 'success',

                async loadSettings() {
                    try {
                        const token = localStorage.getItem('token');
                        const response = await fetch('/api/v1/settings', {
                            headers: { 'X-Session-Token': token }
                        });
                        const result = await response.json();
                        if (result.success && result.data) {
                            const s = {};
                            result.data.forEach(item => { s[item.key] = item.value; });
                            this.settings = s;
                        }
                    } catch (err) {
                        console.error('Failed to load settings:', err);
                    } finally {
                        this.loading = false;
                    }
                },

                async saveSettings() {
                    this.saving = true;
                    this.message = null;
                    try {
                        const token = localStorage.getItem('token');
                        const response = await fetch('/api/v1/settings', {
                            method: 'PATCH',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-Session-Token': token
                            },
                            body: JSON.stringify({ settings: this.settings })
                        });
                        const result = await response.json();
                        if (result.success) {
                            this.message = '設定已儲存';
                            this.messageType = 'success';
                        } else {
                            this.message = '儲存失敗：' + result.message;
                            this.messageType = 'error';
                        }
                    } catch (err) {
                        this.message = '儲存失敗：' + err.message;
                        this.messageType = 'error';
                    } finally {
                        this.saving = false;
                    }
                }
            }" x-init="loadSettings()">

                <!-- Message -->
                <div x-show="message" class="mb-6 rounded-lg p-4 border"
                     :class="messageType === 'success' ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'">
                    <div class="flex items-center justify-between">
                        <p :class="messageType === 'success' ? 'text-green-700' : 'text-red-700'" x-text="message"></p>
                        <button @click="message = null" :class="messageType === 'success' ? 'text-green-600' : 'text-red-600'">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Loading -->
                <div x-show="loading" class="text-center py-12">
                    <p class="text-gray-500">載入中...</p>
                </div>

                <div x-show="!loading" class="space-y-6">
                    <!-- Let's Encrypt -->
                    <div class="card">
                        <h3 class="text-lg font-semibold mb-4">Let's Encrypt 設定</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">註冊郵箱</label>
                                <input x-model="settings.letsencrypt_email" type="email" class="input"
                                       placeholder="admin@example.com">
                                <p class="text-xs text-gray-500 mt-1">用於 Let's Encrypt 帳戶註冊和到期通知</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">ACME 伺服器</label>
                                <select x-model="settings.letsencrypt_server" class="input">
                                    <option value="https://acme-v02.api.letsencrypt.org/directory">正式環境</option>
                                    <option value="https://acme-staging-v02.api.letsencrypt.org/directory">測試環境（Staging）</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Ingress -->
                    <div class="card">
                        <h3 class="text-lg font-semibold mb-4">Ingress 設定</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">預設 Ingress Class</label>
                                <input x-model="settings.default_ingress_class" type="text" class="input"
                                       placeholder="nginx">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Ingress 預設註解（JSON）</label>
                                <textarea x-model="settings.ingress_annotations" class="input" rows="3"
                                          placeholder='{"nginx.ingress.kubernetes.io/proxy-body-size": "50m"}'></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Certificate Renewal -->
                    <div class="card">
                        <h3 class="text-lg font-semibold mb-4">憑證續約設定</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">提前續約天數</label>
                                <input x-model="settings.cert_renewal_days" type="number" class="input"
                                       min="1" max="90" placeholder="30">
                                <p class="text-xs text-gray-500 mt-1">憑證到期前幾天開始自動續約</p>
                            </div>
                            <div>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" :checked="settings.cert_manager_enabled === '1'"
                                           @change="settings.cert_manager_enabled = $event.target.checked ? '1' : '0'"
                                           class="rounded">
                                    <span class="text-sm font-medium text-gray-700">啟用 cert-manager 整合</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Backup -->
                    <div class="card">
                        <h3 class="text-lg font-semibold mb-4">備份設定</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" :checked="settings.backup_enabled === '1'"
                                           @change="settings.backup_enabled = $event.target.checked ? '1' : '0'"
                                           class="rounded">
                                    <span class="text-sm font-medium text-gray-700">啟用自動備份</span>
                                </label>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">備份保留天數</label>
                                <input x-model="settings.backup_retention_days" type="number" class="input"
                                       min="1" max="365" placeholder="30">
                            </div>
                        </div>
                    </div>

                    <!-- Save Button -->
                    <div class="flex justify-end">
                        <button @click="saveSettings()" class="btn-primary" :disabled="saving">
                            <span x-show="!saving">儲存設定</span>
                            <span x-show="saving">儲存中...</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>

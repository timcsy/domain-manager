<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 金鑰 - Kubernetes 域名管理器</title>
    <link href="/dist/styles/main.css" rel="stylesheet">
    <script>
        document.addEventListener('htmx:configRequest', function(evt) {
            const token = localStorage.getItem('token');
            if (token) {
                evt.detail.headers['X-Session-Token'] = token;
            }
        });

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/alpinejs@3.13.7/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div hx-get="/components/sidebar.html" hx-trigger="load" hx-swap="outerHTML"></div>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="bg-white shadow-sm border-b border-gray-200 p-6">
                <h2 class="text-2xl font-bold text-gray-900">API 金鑰管理</h2>
                <p class="text-gray-600 mt-1">管理程式化存取的 API 金鑰</p>
            </header>

            <div class="p-6" x-data="{
                keys: [],
                loading: true,
                showCreate: false,
                newKey: { key_name: '', permissions: ['read'], expires_at: '' },
                createdKey: null,
                error: null,

                async loadKeys() {
                    try {
                        const token = localStorage.getItem('token');
                        const response = await fetch('/api/v1/api-keys', {
                            headers: { 'X-Session-Token': token }
                        });
                        const result = await response.json();
                        if (result.success) {
                            this.keys = result.data || [];
                        }
                    } catch (err) {
                        console.error('Failed to load API keys:', err);
                    } finally {
                        this.loading = false;
                    }
                },

                async createKey() {
                    this.error = null;
                    try {
                        const token = localStorage.getItem('token');
                        const body = {
                            key_name: this.newKey.key_name,
                            permissions: this.newKey.permissions
                        };
                        if (this.newKey.expires_at) {
                            body.expires_at = new Date(this.newKey.expires_at).toISOString();
                        }
                        const response = await fetch('/api/v1/api-keys', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-Session-Token': token
                            },
                            body: JSON.stringify(body)
                        });
                        const result = await response.json();
                        if (result.success) {
                            this.createdKey = result.data.raw_key;
                            this.showCreate = false;
                            this.newKey = { key_name: '', permissions: ['read'], expires_at: '' };
                            await this.loadKeys();
                        } else {
                            this.error = result.message;
                        }
                    } catch (err) {
                        this.error = '建立失敗：' + err.message;
                    }
                },

                async deleteKey(id, name) {
                    if (!confirm('確定要刪除金鑰「' + name + '」嗎？此操作無法復原。')) return;
                    try {
                        const token = localStorage.getItem('token');
                        const response = await fetch('/api/v1/api-keys/' + id, {
                            method: 'DELETE',
                            headers: { 'X-Session-Token': token }
                        });
                        const result = await response.json();
                        if (result.success) {
                            await this.loadKeys();
                        }
                    } catch (err) {
                        console.error('Failed to delete API key:', err);
                    }
                },

                togglePermission(perm) {
                    const idx = this.newKey.permissions.indexOf(perm);
                    if (idx > -1) {
                        this.newKey.permissions.splice(idx, 1);
                    } else {
                        this.newKey.permissions.push(perm);
                    }
                },

                parsePermissions(json) {
                    try { return JSON.parse(json); } catch { return []; }
                },

                formatDate(dateStr) {
                    if (!dateStr) return '-';
                    return new Date(dateStr).toLocaleString('zh-TW');
                },

                copyToClipboard(text) {
                    navigator.clipboard.writeText(text);
                }
            }" x-init="loadKeys()">

                <!-- Created Key Alert -->
                <div x-show="createdKey" class="mb-6 bg-green-50 border border-green-200 rounded-lg p-4">
                    <div class="flex items-start justify-between">
                        <div>
                            <h3 class="text-green-800 font-semibold">金鑰建立成功</h3>
                            <p class="text-green-700 text-sm mt-1">請立即複製並妥善保存，此金鑰不會再次顯示。</p>
                            <div class="mt-2 flex items-center space-x-2">
                                <code class="bg-green-100 text-green-900 px-3 py-1 rounded text-sm font-mono break-all" x-text="createdKey"></code>
                                <button @click="copyToClipboard(createdKey)" class="btn-secondary text-sm px-2 py-1">複製</button>
                            </div>
                        </div>
                        <button @click="createdKey = null" class="text-green-600 hover:text-green-800">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Error Alert -->
                <div x-show="error" class="mb-6 bg-red-50 border border-red-200 rounded-lg p-4">
                    <div class="flex items-start justify-between">
                        <p class="text-red-700" x-text="error"></p>
                        <button @click="error = null" class="text-red-600 hover:text-red-800">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Header with Create Button -->
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <span class="text-gray-600" x-show="!loading" x-text="'共 ' + keys.length + ' 個金鑰'"></span>
                    </div>
                    <button @click="showCreate = true" class="btn-primary">
                        建立金鑰
                    </button>
                </div>

                <!-- Create Key Modal -->
                <div x-show="showCreate" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md" @click.away="showCreate = false">
                        <h3 class="text-lg font-semibold mb-4">建立 API 金鑰</h3>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">金鑰名稱</label>
                                <input x-model="newKey.key_name" type="text" class="input" placeholder="例如：CI/CD Pipeline">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">權限</label>
                                <div class="flex space-x-3">
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" :checked="newKey.permissions.includes('read')" @change="togglePermission('read')" class="rounded">
                                        <span class="text-sm">讀取</span>
                                    </label>
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" :checked="newKey.permissions.includes('write')" @change="togglePermission('write')" class="rounded">
                                        <span class="text-sm">寫入</span>
                                    </label>
                                    <label class="flex items-center space-x-2">
                                        <input type="checkbox" :checked="newKey.permissions.includes('delete')" @change="togglePermission('delete')" class="rounded">
                                        <span class="text-sm">刪除</span>
                                    </label>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">到期日（選填）</label>
                                <input x-model="newKey.expires_at" type="date" class="input">
                            </div>
                        </div>

                        <div class="flex justify-end space-x-3 mt-6">
                            <button @click="showCreate = false" class="btn-secondary">取消</button>
                            <button @click="createKey()" class="btn-primary" :disabled="!newKey.key_name">建立</button>
                        </div>
                    </div>
                </div>

                <!-- Loading -->
                <div x-show="loading" class="text-center py-12">
                    <p class="text-gray-500">載入中...</p>
                </div>

                <!-- Empty State -->
                <div x-show="!loading && keys.length === 0" class="card text-center py-12">
                    <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                    <p class="text-gray-500">尚未建立任何 API 金鑰</p>
                    <button @click="showCreate = true" class="btn-primary mt-4">建立第一個金鑰</button>
                </div>

                <!-- Keys Table -->
                <div x-show="!loading && keys.length > 0" class="card overflow-hidden p-0">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">名稱</th>
                                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">權限</th>
                                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">最後使用</th>
                                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">到期日</th>
                                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">建立時間</th>
                                <th class="text-right px-6 py-3 text-xs font-medium text-gray-500 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <template x-for="key in keys" :key="key.id">
                                <tr class="hover:bg-gray-50">
                                    <td class="px-6 py-4">
                                        <span class="font-medium text-gray-900" x-text="key.key_name"></span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex space-x-1">
                                            <template x-for="perm in parsePermissions(key.permissions)" :key="perm">
                                                <span class="badge-info text-xs" x-text="perm"></span>
                                            </template>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-500" x-text="formatDate(key.last_used_at)"></td>
                                    <td class="px-6 py-4 text-sm text-gray-500" x-text="formatDate(key.expires_at)"></td>
                                    <td class="px-6 py-4 text-sm text-gray-500" x-text="formatDate(key.created_at)"></td>
                                    <td class="px-6 py-4 text-right">
                                        <button @click="deleteKey(key.id, key.key_name)" class="text-red-600 hover:text-red-800 text-sm font-medium">
                                            刪除
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <!-- Usage Instructions -->
                <div x-show="!loading" class="card mt-6">
                    <h3 class="text-lg font-semibold mb-3">使用方式</h3>
                    <div class="bg-gray-900 rounded-lg p-4 text-sm font-mono text-gray-100">
                        <p class="text-gray-400"># 使用 X-API-Key header</p>
                        <p>curl -H "X-API-Key: dm_your_key_here" http://localhost:8080/api/v1/domains</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>

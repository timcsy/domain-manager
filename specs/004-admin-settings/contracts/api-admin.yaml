# API Contract: Admin Account Management

# PATCH /api/v1/admin/password
# 修改管理員密碼
# Request:
#   { "old_password": "xxx", "new_password": "yyy" }
# Response (success):
#   { "success": true, "message": "Password changed. Please login again." }
# Response (wrong old password):
#   { "success": false, "error": "Bad Request", "message": "Old password is incorrect" }
# Response (new password too short):
#   { "success": false, "error": "Bad Request", "message": "Password must be at least 6 characters" }

# PATCH /api/v1/admin/email
# 修改管理員 email
# Request:
#   { "email": "new@example.com" }
# Response (success):
#   { "success": true, "data": { "email": "new@example.com" }, "message": "Email updated" }

# GET /api/v1/admin/profile
# 取得管理員基本資訊（不含密碼）
# Response:
#   { "success": true, "data": { "username": "admin", "email": "admin@localhost" } }

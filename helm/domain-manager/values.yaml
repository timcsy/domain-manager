# Default values for domain-manager
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: domain-manager/domain-manager
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Admin account configuration
admin:
  username: admin
  password: "change-this-password"  # Please change in production
  email: "admin@example.com"

# Ingress controller configuration
ingress:
  enabled: false  # Managed by the application itself
  className: "nginx"
  certManager:
    enabled: true
    issuerEmail: "admin@example.com"
    acmeServer: "https://acme-v02.api.letsencrypt.org/directory"
    # For testing, use staging:
    # acmeServer: "https://acme-staging-v02.api.letsencrypt.org/directory"

# Persistence configuration
persistence:
  enabled: true
  storageClass: ""  # Use default storage class
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# MCP Server configuration
mcp:
  enabled: true
  port: 8080

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retentionDays: 30

# RBAC configuration
rbac:
  create: true

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

# Probes
livenessProbe:
  httpGet:
    path: /api/v1/diagnostics/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/diagnostics/health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Environment variables
env:
  - name: LOG_LEVEL
    value: "info"
  - name: DATABASE_PATH
    value: "/data/database.db"
  - name: PORT
    value: "8080"

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

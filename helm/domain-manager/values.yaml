# Default values for domain-manager
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# cert-manager dependency
# Set to false if cert-manager is already installed in the cluster
cert-manager:
  enabled: true
  installCRDs: true
  # You can customize cert-manager settings here
  # For full options, see: https://github.com/cert-manager/cert-manager/tree/master/deploy/charts/cert-manager

replicaCount: 1

image:
  repository: ghcr.io/timcsy/domain-manager
  pullPolicy: IfNotPresent
  tag: "v0.2.10"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Admin account configuration
admin:
  username: admin
  password: "change-this-password"  # Please change in production
  email: "admin@example.com"

# Ingress controller configuration
ingress:
  enabled: false  # Managed by the application itself
  className: "nginx"
  certManager:
    enabled: true
    issuerEmail: "timcsy@tew.tw"
    acmeServer: "https://acme-v02.api.letsencrypt.org/directory"
    # For testing, use staging:
    # acmeServer: "https://acme-staging-v02.api.letsencrypt.org/directory"

# Subdomain management configuration
subdomains:
  # Default SSL mode for new subdomains
  # Options: "none", "manual", "auto" (Let's Encrypt)
  defaultSslMode: "auto"

  # Default ingress class for subdomains
  # Use the same class as above ingress.className
  defaultIngressClass: "nginx"

  # Health check configuration
  healthCheck:
    enabled: true
    # How often to check subdomain health (cron format)
    # Default: every 5 minutes
    schedule: "*/5 * * * *"
    # Timeout for HTTP health checks
    timeout: 10s
    # Consider 2xx and 3xx as healthy
    healthyStatusCodes: [200, 201, 202, 203, 204, 205, 206, 300, 301, 302, 303, 304, 307, 308]

# Persistence configuration
persistence:
  enabled: true
  storageClass: ""  # Use default storage class
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Cloudflare DNS-01 configuration
cloudflare:
  enabled: false
  # Cloudflare API Token (Zone:DNS:Edit permission)
  # Leave empty to configure later via Web UI
  apiToken: ""

# API Key configuration
apiKeys:
  # Pre-configured API keys (optional)
  # Keys will be created on startup
  # Example:
  # keys:
  #   - name: "CI/CD Pipeline"
  #     permissions: ["read", "write"]
  enabled: true

# MCP Server configuration
mcp:
  enabled: true
  # MCP endpoint is served on the same port as the main API
  # No separate port needed

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retentionDays: 30

# RBAC configuration
rbac:
  create: true

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

# Probes
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Environment variables
env:
  - name: LOG_LEVEL
    value: "info"
  - name: DATABASE_PATH
    value: "/data/database.db"
  - name: PORT
    value: "8080"
  - name: LETSENCRYPT_EMAIL
    value: "timcsy@tew.tw"
  - name: LETSENCRYPT_ENV
    value: "production"

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

{{- if and .Values.cloudflare.enabled .Values.cloudflare.apiToken }}
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "domain-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-token: {{ .Values.cloudflare.apiToken | quote }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "domain-manager.fullname" . }}
  labels:
    {{- include "domain-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "domain-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "domain-manager.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "domain-manager.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        {{- range .Values.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        - name: DATABASE_PATH
          value: {{ .Values.persistence.mountPath }}/database.db
        - name: PORT
          value: "{{ .Values.service.targetPort }}"
        - name: CLOUDFLARE_ENABLED
          value: {{ .Values.cloudflare.enabled | quote }}
        {{- if .Values.cloudflare.apiToken }}
        - name: CLOUDFLARE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-api-token
              key: api-token
              optional: true
        {{- end }}
        - name: DEFAULT_INGRESS_CLASS
          value: {{ .Values.subdomains.defaultIngressClass | quote }}
        - name: MCP_ENABLED
          value: {{ .Values.mcp.enabled | quote }}
        - name: BACKUP_ENABLED
          value: {{ .Values.backup.enabled | quote }}
        - name: BACKUP_RETENTION_DAYS
          value: {{ .Values.backup.retentionDays | quote }}
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: data
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "domain-manager.fullname" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

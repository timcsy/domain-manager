{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "domain-manager.fullname" . }}
  labels:
    {{- include "domain-manager.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["services", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "domain-manager.fullname" . }}
  labels:
    {{- include "domain-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "domain-manager.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "domain-manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}

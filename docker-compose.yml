version: '3.9'

services:
  domain-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: domain-manager:latest
    container_name: domain-manager
    ports:
      - "8080:8080"
    environment:
      - K8S_MOCK=true
      - K8S_IN_CLUSTER=false
      - DB_PATH=/app/data/database.db
      - LOG_LEVEL=info
    volumes:
      # 持久化資料庫
      - domain-manager-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/diagnostics/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - domain-manager-network

volumes:
  domain-manager-data:
    driver: local

networks:
  domain-manager-network:
    driver: bridge

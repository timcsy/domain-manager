apiVersion: apps/v1
kind: Deployment
metadata:
  name: domain-manager
  namespace: domain-manager
  labels:
    app: domain-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: domain-manager
  template:
    metadata:
      labels:
        app: domain-manager
    spec:
      serviceAccountName: domain-manager
      containers:
      - name: domain-manager
        image: ghcr.io/timcsy/domain-manager:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: DB_PATH
          value: "/data/domain-manager.db"
        - name: K8S_IN_CLUSTER
          value: "true"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: domain-manager-data

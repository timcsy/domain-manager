apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: domain-manager
  namespace: domain-manager
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - domain-manager.yourdomain.com
    secretName: domain-manager-tls
  rules:
  - host: domain-manager.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: domain-manager
            port:
              number: 80
